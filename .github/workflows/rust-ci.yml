name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/pi-rust/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/pi-rust/**'

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-format-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pi-rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/pi-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/pi-rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release
