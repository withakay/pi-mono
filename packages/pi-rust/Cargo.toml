[package]
name = "pi-coding-agent"
version = "0.1.0"
edition = "2021"
authors = ["Pi Contributors"]
description = "Pi coding agent - Rust port"
license = "MIT"

[[bin]]
name = "pi"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1.41", features = ["full"] }

# CLI and terminal UI
clap = { version = "4.5", features = ["derive", "cargo"] }
ratatui = "0.29"
crossterm = "0.28"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# File system and paths
ignore = "0.4"
globset = "0.4"
walkdir = "2.5"

# Process execution
async-process = "2.3"

# HTTP client for LLM APIs
reqwest = { version = "0.12", features = ["json", "stream"] }

# Configuration
toml = "0.8"
dirs = "5.0"

# Diff and patch
similar = "2.6"

# Event system
tokio-stream = "0.1"

# UUID and time
uuid = { version = "1.11", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Async trait
async-trait = "0.1"

[dev-dependencies]
tempfile = "3.13"
mockito = "1.5"
assert_cmd = "2.0"
predicates = "3.1"
